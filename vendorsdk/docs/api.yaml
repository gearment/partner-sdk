  /api/v3/webhooks:
    get:
      tags:
        - api.webhook.v1.VendorWebhookAPI
      summary: List Webhook
      description: |-
        List all registered webhooks

         GET /api/v3/webhooks

         Returns:
           - All registered webhooks for your account
           - Webhook status (active/inactive)
           - Event topics subscribed
           - Delivery URLs

         Use cases:
           - Audit webhook configurations
           - Verify webhook setup
           - List active event subscriptions
      operationId: api.webhook.v1.VendorWebhookAPI.VendorListWebhook
      parameters:
        - name: filter.statuses
          in: query
          description: Filter by webhook status (e.g., to see only active webhooks)
          schema:
            type: array
            items:
              $ref: '#/components/schemas/api.webhook.v1.VendorWebhook.Status'
            title: statuses
            description: Filter by webhook status (e.g., to see only active webhooks)
        - name: filter.store_ids
          in: query
          description: Filter by store IDs
          schema:
            type: array
            items:
              type: string
              examples:
                - store_abc123
              minLength: 1
            title: store_ids
            description: Filter by store IDs
        - name: filter.team_ids
          in: query
          description: Filter by team IDs (internal use)
          schema:
            type: array
            items:
              type: string
              examples:
                - team_abc123
              minLength: 1
            title: team_ids
            description: Filter by team IDs (internal use)
        - name: filter.topics
          in: query
          description: Filter by event topics
          schema:
            type: array
            items:
              $ref: '#/components/schemas/api.webhook.v1.VendorWebhook.Topic'
            title: topics
            description: Filter by event topics
        - name: filter.versions
          in: query
          description: Filter by webhook version
          schema:
            type: array
            items:
              $ref: '#/components/schemas/api.webhook.v1.VendorWebhook.Version'
            title: versions
            description: Filter by webhook version
        - name: filter.webhook_ids
          in: query
          description: Filter by specific webhook IDs
          schema:
            type: array
            items:
              type: string
              examples:
                - wh_abc123
              minLength: 1
            title: webhook_ids
            description: Filter by specific webhook IDs
        - name: paging.limit
          in: query
          schema:
            type: integer
            title: limit
            format: int32
        - name: paging.page
          in: query
          schema:
            type: integer
            title: page
            format: int32
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.webhook.v1.VendorListWebhookResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
      security: []
    post:
      tags:
        - api.webhook.v1.VendorWebhookAPI
      summary: Create Webhook
      description: |-
        Register a new webhook for event notifications

         POST /api/v3/webhooks
         Content-Type: application/json

         Available topics:
           - VENDOR_WEBHOOK_TOPIC_ORDER_COMPLETED: Order fulfillment completed
           - VENDOR_WEBHOOK_TOPIC_ORDER_CANCELED: Order was cancelled
           - VENDOR_WEBHOOK_TOPIC_TRACKING_UPDATED: Shipping tracking updated
           - VENDOR_WEBHOOK_TOPIC_ADDRESS_UNVERIFIED: Shipping address validation failed

         Security:
           - Webhooks are sent via HTTPS POST
           - Include signature header for verification
           - Must respond with 200 OK within 30 seconds

         Use cases:
           - Automate order status updates
           - Sync tracking information
           - Alert customers of shipment
      operationId: api.webhook.v1.VendorWebhookAPI.VendorCreateWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.webhook.v1.VendorCreateWebhookRequest'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.webhook.v1.VendorCreateWebhookResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
      security: []
      parameters: []
  /api/v3/webhooks/{webhook_id}:
    delete:
      tags:
        - api.webhook.v1.VendorWebhookAPI
      summary: Delete Webhook
      description: |-
        Delete a webhook subscription

         DELETE /api/v3/webhooks/{webhook_id}

         Use cases:
           - Remove unused webhooks
           - Update webhook configuration (delete + recreate)
      operationId: api.webhook.v1.VendorWebhookAPI.VendorDeleteWebhook
      parameters:
        - name: webhook_id
          in: path
          description: Webhook ID is provided in URL path parameter
          required: true
          schema:
            type: string
            title: webhook_id
            maxLength: 255
            minLength: 1
            description: Webhook ID is provided in URL path parameter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.webhook.v1.VendorDeleteWebhookResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
