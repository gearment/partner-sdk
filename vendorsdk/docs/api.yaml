    get:
      tags:
        - api.catalog.v1.VendorCatalogAPI
      summary: List Catalog Variant
      description: |-
        List product variants with detailed specifications

         GET /api/v3/catalog/variants

         Returns:
           - Variant details (size, color, SKU)
           - Pricing information
           - Stock availability
           - Print area specifications

         Use cases:
           - Get variant-specific pricing
           - Check size/color availability
           - Display product options to customers
      operationId: api.catalog.v1.VendorCatalogAPI.VendorListCatalogVariant
      parameters:
        - name: filter.color_codes
          in: query
          description: Filter by color codes (internal codes or hex)
          schema:
            type: array
            items:
              type: string
              examples:
                - COLOR_BLACK
              maxLength: 100
              minLength: 1
            title: color_codes
            description: Filter by color codes (internal codes or hex)
        - name: filter.colors
          in: query
          description: Filter by colors (display names)
          schema:
            type: array
            items:
              type: string
              examples:
                - Black
              maxLength: 100
              minLength: 1
            title: colors
            description: Filter by colors (display names)
        - name: filter.legacy_variant_ids
          in: query
          description: Filter by legacy variant IDs (for backward compatibility)
          schema:
            type: array
            items:
              exclusiveMinimum: 0
              type: integer
              examples:
                - 12345
              format: int32
            title: legacy_variant_ids
            description: Filter by legacy variant IDs (for backward compatibility)
        - name: filter.product_ids
          in: query
          description: Filter by product IDs
          schema:
            type: array
            items:
              type: string
              examples:
                - prod_abc123
              maxLength: 100
              minLength: 1
            title: product_ids
            description: Filter by product IDs
        - name: filter.search_text
          in: query
          description: Search variants by text
          schema:
            type: string
            examples:
              - Black Medium
            title: search_text
            description: Search variants by text
        - name: filter.size_codes
          in: query
          description: Filter by size codes (internal codes)
          schema:
            type: array
            items:
              type: string
              examples:
                - SIZE_M
              maxLength: 100
              minLength: 1
            title: size_codes
            description: Filter by size codes (internal codes)
        - name: filter.sizes
          in: query
          description: Filter by sizes (display names)
          schema:
            type: array
            items:
              type: string
              examples:
                - M
              maxLength: 100
              minLength: 1
            title: sizes
            description: Filter by sizes (display names)
        - name: filter.skus
          in: query
          description: Filter by SKUs
          schema:
            type: array
            items:
              type: string
              examples:
                - SKU-TS-BLK-M
              maxLength: 100
              minLength: 1
            title: skus
            description: Filter by SKUs
        - name: filter.stock_labels
          in: query
          description: Filter by stock availability
          schema:
            type: array
            items:
              $ref: '#/components/schemas/api.catalog.v1.VendorCatalogVariantStockLabel'
            title: stock_labels
            description: Filter by stock availability
        - name: filter.variant_ids
          in: query
          description: Filter by specific variant IDs
          schema:
            type: array
            items:
              type: string
              examples:
                - var_123
              maxLength: 100
              minLength: 1
            title: variant_ids
            description: Filter by specific variant IDs
        - name: paging.limit
          in: query
          schema:
            type: integer
            title: limit
            format: int32
        - name: paging.page
          in: query
          schema:
            type: integer
            title: page
            format: int32
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.catalog.v1.VendorListCatalogVariantResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
      security: []
