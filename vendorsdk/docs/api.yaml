            title: payment_status
            description: Filter by payment status (for legacy API compatibility)
        - name: filter.reference_ids
          in: query
          description: Filter by platform reference IDs (platform_ref field)
          schema:
            type: array
            items:
              type: string
              examples:
                - shopify_12345
              maxLength: 100
              minLength: 1
            title: reference_ids
            description: Filter by platform reference IDs (platform_ref field)
        - name: filter.statuses
