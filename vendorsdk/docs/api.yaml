openapi: 3.1.0
info:
  contact:
    email: integration@gearment.com
    name: Support Integration
  termsOfService: https://gearment.com/integration/api-terms-of-service.html
  title: Gearment API integration
  version: v3.0.0
  description: Find out more about Gearment API v3
servers:
  - url: https://apiv2.gearment.com/integration-handler
    description: Production Server
  - url: https://api.gearmentinc.com/integration-handler
    description: Sandbox Server
tags:
  - name: api.catalog.v1.VendorCatalogAPI
    description: |-
      VendorCatalogAPI provides access to product catalog and inventory management.
       Use these endpoints to browse available products, check stock status, and get product details.

       Base URL: https://api.gearment.com/
       Authentication: API Key (header: X-API-Key, X-API-Secret)
    x-displayName: Catalog
  - name: api.webhook.v1.VendorWebhookAPI
    description: |-
      VendorWebhookAPI provides webhook management for real-time event notifications.
       Register webhooks to receive automated notifications when orders are completed, cancelled, or tracking is updated.

       Base URL: https://api.gearment.com/
       Authentication: API Key (header: X-API-Key, X-API-Secret)
    x-displayName: Webhook
  - name: api.order.v1.VendorOrderAPI
    description: |-
      VendorOrderAPI provides comprehensive order management capabilities for vendors.
       All endpoints require authentication via X-API-Key and X-API-Secret headers.

       Base URL: https://api.gearment.com/
       Authentication: API Key (header: X-API-Key, X-API-Secret)
    x-displayName: Order
  - name: api.support.v1.VendorSupportAPI
    description: VendorSupportAPI is the modern (v3) vendor-facing issue-ticket API.
    x-displayName: Support
externalDocs:
  description: Find out more about Gearment API v3
  url: https://gearment.com/integration/api-docs.html
paths:
  /api/v3/catalog:
    get:
      tags:
        - api.catalog.v1.VendorCatalogAPI
      summary: List Catalog
      description: |-
        List all available products in the catalog

         GET /api/v3/catalog

         Returns:
           - Product listings with base information
           - Available variants for each product
           - Pricing and printing options

         Use cases:
           - Build product catalog in your system
           - Display available products to customers
           - Sync product updates
      operationId: api.catalog.v1.VendorCatalogAPI.VendorListCatalog
      parameters:
        - name: filter.product_ids
          in: query
          description: Filter by specific product IDs
          schema:
            type: array
            items:
              type: string
              examples:
                - prod_abc123
              maxLength: 100
              minLength: 1
            title: product_ids
            description: Filter by specific product IDs
        - name: filter.search_text
          in: query
          description: Search products by name or description
          schema:
            type: string
            examples:
              - Unisex T-Shirt
            title: search_text
            maxLength: 100
            description: Search products by name or description
        - name: paging.limit
          in: query
          schema:
            type: integer
            title: limit
            format: int32
        - name: paging.page
          in: query
          schema:
            type: integer
            title: page
            format: int32
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.catalog.v1.VendorListCatalogResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
      security: []
