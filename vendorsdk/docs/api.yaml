         Returns:
           - Stock status: in_stock, out_of_stock, discontinued, temporarily_unavailable
           - Expected restock date (if applicable)

         Use cases:
           - Verify stock before order placement
           - Update product availability in your system
           - Show stock status to customers
      operationId: api.catalog.v1.VendorCatalogAPI.VendorGetCatalogStockStatus
      parameters:
        - name: filter.color_codes
          in: query
          description: Filter by color codes (internal codes or hex)
          schema:
            type: array
            items:
              type: string
              examples:
                - COLOR_BLACK
              maxLength: 100
              minLength: 1
            title: color_codes
            description: Filter by color codes (internal codes or hex)
        - name: filter.colors
          in: query
          description: Filter by colors (display names)
          schema:
            type: array
            items:
