openapi: 3.1.0
info:
  contact:
    email: engineering@gearment.com
    name: Gearment Engineering Team
    url: https://gearment.com
  license: {}
  termsOfService: https://gearment.com/integration/api-terms-of-service.html
  title: api.webhook.v1
  version: 3.0.0
servers:
  - url: https://api.dev.geadev.com/{serviceName}
    description: Staging Server
    variables:
      serviceName:
        default: iam
        enum:
          - iam
          - product
          - seller
        description: The service name
  - url: http://localhost:{servicePort}
    description: Local Server
    variables:
      servicePort:
        default: '9000'
        description: The port number
tags:
  - name: api.webhook.v1.WebhookAPI
    x-displayName: api.webhook.v1.WebhookAPI
  - name: api.order.v1.VendorOrderAPI
    description: >-
      ProductListingVendorAPI provide an abstraction to all of read and write
      data access for order businesses
    x-displayName: api.order.v1.VendorOrderAPI
  - name: api.order.v1.OrderAPI
    x-displayName: api.order.v1.OrderAPI
  - name: api.health.v1.HealthService
    x-displayName: api.health.v1.HealthService
  - name: api.catalog.v1.VendorCatalogAPI
    description: >-
      ProductListingVendorAPI provide an abstraction to all of read and write
      data access for order businesses
    x-displayName: api.catalog.v1.VendorCatalogAPI
  - name: api.support.v1.SupportAPI
    x-displayName: api.support.v1.SupportAPI
  - name: api.pod.v1.SellerShippingLabelAPI
    description: Seller-facing shipping label API for the USPS/EasyPost pilot. Requires an authenticated Gearment POD team session and per-team enablement by Gearment staff.
    x-displayName: Seller Shipping Labels
externalDocs:
  description: Find out more about Gearment API v3
  url: https://gearment.com/integration/api-docs.html
